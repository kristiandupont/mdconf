name: Pull Requests

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and test
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
      - run: npm install
      - run: npm run lint
      - run: npm run test
